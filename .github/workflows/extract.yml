name: Extract Zip

on:
  push:
    paths:
      - '*.zip'
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'Direct download URL of the .zip file to extract'
        required: false
        type: string

permissions:
  contents: write

jobs:
  extract-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete all files/folders except .github, .git, and *.zip
        run: |
          find . -mindepth 1 -maxdepth 1 \
          ! -name '.github' \
          ! -name '.git' \
          ! -name '*.zip' \
          -exec rm -rf {} +
        working-directory: ${{ github.workspace }}

      - name: Download zip from provided URL (manual dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.zip_url != ''
        run: |
          curl -L -o downloaded.zip "${{ github.event.inputs.zip_url }}"
        working-directory: ${{ github.workspace }}

      - name: Extract all .zip archives
        run: |
          for archive in *.zip; do
            if [ -f "$archive" ]; then
              echo "Extracting $archive"
              unzip -o "$archive"
            fi
          done
        working-directory: ${{ github.workspace }}

      - name: Delete extracted .zip files
        run: rm -f *.zip
        working-directory: ${{ github.workspace }}

      - name: Commit and push changes to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract zip archive and cleanup [skip ci]"
            git push origin main
          fi
