name: Add Series Navigation

on:
  workflow_dispatch:        # manual trigger
  push:
    paths:
      - 'pages/_collections/_diary.index.*/**.md'
      - 'pages/_collections/_diary.index.*/**.html'

jobs:
  add-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Append series-nav include to files
        run: |
          # Find all .md/.html files inside any _diary.index.* folder
          find pages/_collections/_diary.index.*/ -type f \( -name "*.md" -o -name "*.html" \) | while read file; do
            echo "Processing $file"

            # Compute series_dir from the file's parent directory
            # Example: pages/_collections/_diary.index.2019/entry.md -> /pages/_collections/_diary.index.2019/
            dir_path=$(dirname "$file")
            series_dir="/${dir_path#pages/}/"   # remove leading 'pages/' and add leading slash + trailing slash

            # The line we want to insert
            include_line="{% include series-nav.html series_dir=\"$series_dir\" %}"

            # Check if the include already exists in the file
            if grep -Fq "$include_line" "$file"; then
              echo "  → Already has series-nav, skipping"
            else
              # Append a newline and the include line
              echo -e "\n\n$include_line" >> "$file"
              echo "  → Added series-nav"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/_collections/_diary.index.*/
          git diff --staged --quiet || git commit -m "Auto-add series navigation to diary pages"
          git push
