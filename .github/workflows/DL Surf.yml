name: Upload files from list.txt to dl.surf

on:
  workflow_dispatch:               # manual trigger
  push:
    paths:
      - 'hosts/list.txt'           # auto-run when list changes

env:
  PYTHONUNBUFFERED: 1              # real-time log output

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run uploader
        env:
          DL_SURF_API_KEY: ${{ secrets.DL_SURF_API_KEY }}
        run: python scripts/uploader.py
