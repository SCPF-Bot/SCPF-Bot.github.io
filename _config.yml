googlefonts:
 - url: https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap

chulapa-skin: 
  skin: gitdev-dark
  vars:
    font-family-base: "Ubuntu Mono"

comments:
  # provider: giscus etc. (kept as is)

# COLLECTIONS (optimized with YAML anchors)
collections:
  e.tech:
    output: true
    permalink: /e.tech/:name

  # Base anchor for diary collections
  diary_base: &diary_collection
    output: true
    permalink: /diary.index.:year/:name   # will be overridden per year

  diary.index.2019:
    <<: *diary_collection
    permalink: /diary.index.2019/:name
  diary.index.2020:
    <<: *diary_collection
    permalink: /diary.index.2020/:name
  diary.index.2021:
    <<: *diary_collection
    permalink: /diary.index.2021/:name
  diary.index.2022:
    <<: *diary_collection
    permalink: /diary.index.2022/:name
  diary.index.2023:
    <<: *diary_collection
    permalink: /diary.index.2023/:name
  diary.index.2024:
    <<: *diary_collection
    permalink: /diary.index.2024/:name
  diary.index.2025:
    <<: *diary_collection
    permalink: /diary.index.2025/:name

collections_dir: pages/_collections

# DEFAULTS (optimized with YAML anchors)
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      include_on_search: false
      show_comments: true
      show_date: false

  # Apply series layout to all diary index collections
  - scope:
      path: "pages/_collections/_diary.index."
    values:
      layout: "series"

  # Base anchor for diary year overrides
  diary_year_defaults: &diary_defaults
    values:
      header_type: "hero"
      header_img: assets/images/main.003.jpeg
      show_comments: false
      show_date: false

  - scope:
      path: "pages/_collections/_diary.index.2019"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2020"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2021"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2022"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2023"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2024"
    <<: *diary_defaults
  - scope:
      path: "pages/_collections/_diary.index.2025"
    <<: *diary_defaults

# Miscellaneous (unchanged)
compress_html:
  clippings: all
  blanklines: true

plugins:
  - jekyll-github-metadata
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-sitemap

exclude:
  - LICENSE
  - Gemfile
  - vendor

include:
  - readme

markdown: kramdown
highlighter: github
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  footnote_backlink: '&uarr;'
  entity_output: as_char
  toc_levels: 2..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed
