remote_theme: dieghernan/chulapa

url: "https://scpf-bot.github.io"
baseurl: ""

title: SCPF-Bot
subtitle: Private Website
description: >-
  A private personal website and digital archive dedicated to Babii —
  containing daily diary entries, life guides, educational content, and more.

author:
  name                  :      SCPF-Bot
  avatar                :      https://avatars.githubusercontent.com/u/112224835
  location              :      SCP Foundation (Site-19)
  links:
    - url: https://fb.me/june.12th.2019
      icon: "fab fa-facebook"
    - url: https://github.com/SCPF-Archive
      icon: "fab fa-github"
    - url: https://github.com/SCPF-Bot
      icon: "fab fa-github"
    - url: mailto:ph.server@pm.me
      icon: "fa fa-envelope"

# Navigation Bar contents.
navbar:
  style: "classic"
  brand:
    title: SCPF-Bot
    img: "https://avatars.githubusercontent.com/u/112224835"
  nav:

  - title: Home
    url: /index

  - title: E-Tech
    child:
     - title: Web Versions
       url: /pages/diary-index/web-versions

  - title: Babii
    child:
     - title: Diary Index
       url: /pages/diary-index/
     - title: To-Do List
       url: /pages/misc/to-do-list
     - title: Archive
       url: /pages/archive/readme

  - title: Zero to Stable
    child:
     - title: Introduction
       url: /pages/zero-to-stable/page-000
     - title: Phase 1
       url: /pages/zero-to-stable/page-001
     - title: Phase 2
       url: /pages/zero-to-stable/page-002
     - title: Phase 3
       url: /pages/zero-to-stable/page-003

  - title: Special Thanks
    url: /pages/misc/special-thanks

footer:
  links:
    - label : Facebook
      icon  : fab fa-facebook
      url   : https://fb.me/ultimatinium
    - label : GitHub
      icon  : fab fa-github
      url   : https://github.com/SCPF-Bot
    - label : Proton Mail
      icon  : fa fa-envelope
      url   : mailto:ph.server@pm.me
  copyright: "© 2022–2026 by SCPF-Bot"

# Font URL for Google Fonts.
googlefonts:
 - url: https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap

# Theme skin configuration.
chulapa-skin:
  skin: gitdev-dark
  vars:
    font-family-base: "Ubuntu Mono"

# Comments provider for the webpage.
comments:
  #provider: giscus       # https://giscus.app
  #provider: welcomments
  #website_id: "JmOHDoyWDZURoAoxETF4oNUl2"
  #provider: disqus       # https://disqus.com
  #disqus_shortname: scpf-archive

# Collections path where you place your posts.
# (Ex. pages/_collections/_diary-2025/2025-06-21.md)
collections:
  e-tech:
    output: true
    permalink: /e-tech/:name
  diary-2019:
    output: true
    permalink: /diary-2019/:name
  diary-2020:
    output: true
    permalink: /diary-2020/:name
  diary-2021:
    output: true
    permalink: /diary-2021/:name
  diary-2022:
    output: true
    permalink: /diary-2022/:name
  diary-2023:
    output: true
    permalink: /diary-2023/:name
  diary-2024:
    output: true
    permalink: /diary-2024/:name
  diary-2025:
    output: true
    permalink: /diary-2025/:name
  diary-2026:
    output: true
    permalink: /diary-2026/:name

# Collections directory path.
collections_dir: pages/_collections

# Defaults for page customizations — controls layout and design per scope.
# Adding a new year: create pages/_collections/_diary-YEAR/ and add a
# collection entry above. No new defaults block needed.
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
      include_on_search : false
      show_comments     : true
      show_date         : false

  -
    scope:
      path: "pages/_collections"
    values:
      header_type       : "hero"
      header_img        : assets/images/main.003.jpeg
      show_comments     : false
      show_date         : false
      show_bottomnavs   : true

  -
    scope:
      path: "pages/zero-to-stable"
    values:
      header_type       : "hero"
      header_img        : assets/images/main.003.jpeg
      show_comments     : false
      show_date         : false
      show_bottomnavs   : false

# HTML compression settings.
compress_html:
  clippings: all
  blanklines: true

plugins:
  - jekyll-github-metadata
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-sitemap

exclude:
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.sh"
  - node_modules
  - .git

include:
  - readme.txt

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  footnote_backlink: '&uarr;'
  entity_output: as_char
  toc_levels: 2..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed
