# Font URL for Google fonts.
googlefonts:
 - url: https://fonts.googleapis.com/css2?family=Ubuntu+Mono&display=swap

# Theme Skins.
chulapa-skin: 
  skin: gitdev-dark
  vars:
    font-family-base: "Ubuntu Mono"

# Comments provider for the webpage.
comments:
  #provider: giscus #https://giscus.app
  #provider: welcomments
  #website_id: "JmOHDoyWDZURoAoxETF4oNUl2"
  #provider: disqus #https://disqus.com
  #disqus_shortname: scpf-archive

#### Defaults (Do not modify.)
# Collections path where you place your posts.
# (Ex. pages/collections/_my.posts/post1.md)
collections:
  e.tech:
    output: true
    permalink: /e.tech/:name
  diary.index.2019:
    output: true
    permalink: /diary.index.2019/:name
  diary.index.2020:
    output: true
    permalink: /diary.index.2020/:name
  diary.index.2021:
    output: true
    permalink: /diary.index.2021/:name
  diary.index.2022:
    output: true
    permalink: /diary.index.2022/:name
  diary.index.2023:
    output: true
    permalink: /diary.index.2023/:name
  diary.index.2024:
    output: true
    permalink: /diary.index.2024/:name
  diary.index.2025:
    output: true
    permalink: /diary.index.2025/:name

# Collections directory path.
collections_dir: pages/_collections

# Defaults for page customizations.
defaults:
  # Global fallback
  -
    scope:
      path: ""
    values:
      layout: "default"
      include_on_search: false
      show_comments: true
      show_date: false

  # Diary collections (all years) - uses series layout
  -
    scope:
      path: "pages/_collections/_diary.index."
    values:
      layout: "series"
      header_type: "hero"
      header_img: assets/images/main.003.jpeg
      show_comments: false
      show_date: false

  # E-Tech collection - uses series layout
  -
    scope:
      path: "pages/_collections/_e.tech"
    values:
      layout: "series"
      header_type: "hero"          # optional, adjust as needed
      header_img: assets/images/main.003.jpeg
      show_comments: false
      show_date: false

  # Zero to Stable (regular directory) - uses series layout
  -
    scope:
      path: "pages/zero.to.stable"
    values:
      layout: "series"
      show_date: false
      # You can add header_type or other customizations here

# Miscellaneous options.
compress_html:
  clippings: all
  blanklines: true

plugins:
  - jekyll-github-metadata
  - jekyll-paginate
  - jekyll-include-cache
  - jekyll-sitemap

exclude:
  - LICENSE
  - Gemfile
  - vendor

include:
  - readme

markdown: kramdown
highlighter: github
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  footnote_backlink: '&uarr;'
  entity_output: as_char
  toc_levels: 2..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed
